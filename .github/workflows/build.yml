name: Build APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Website URL"
        required: true
      app_name:
        description: "App Name"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android
      uses: android-actions/setup-android@v3

    - name: Install ImageMagick
      run: sudo apt-get install -y imagemagick

    - name: Set App Name
      run: |
        sed -i "s|MY_APP_NAME|${{ github.event.inputs.app_name }}|g" template/app/src/main/res/values/strings.xml

    - name: Download Logo
      run: |
        curl -L -A "Mozilla/5.0" "${{ github.event.inputs.url }}/favicon.ico" -o logo.ico || true
        curl -L -A "Mozilla/5.0" "${{ github.event.inputs.url }}/favicon.png" -o logo.png || true

    - name: Check Logo File
      run: |
        file logo.ico || true
        file logo.png || true

    - name: Convert and Resize Logo
      run: |
        if file logo.ico | grep -q "image"; then
          convert logo.ico -resize 512x512 logo.png
        elif file logo.png | grep -q "image"; then
          convert logo.png -resize 512x512 logo.png
        else
          echo "No valid logo found, using default"
          cp template/app/src/main/res/mipmap-mdpi/ic_launcher.png logo.png
        fi

    - name: Replace App Icons
      run: |
        for dir in template/app/src/main/res/mipmap-*; do
          cp logo.png $dir/ic_launcher.png || true
        done

    - name: Replace URL
      run: |
        sed -i "s|MY_URL|${{ github.event.inputs.url }}|g" template/app/src/main/java/com/webviewtemplate/webviewtemplate/MainActivity.kt

    - name: Build APK
      run: |
        cd template
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: template/app/build/outputs/apk/debug/app-debug.apk

name: Build APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Website URL"
        required: true
      app_name:
        description: "App Name"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android
      uses: android-actions/setup-android@v3

    - name: Install ImageMagick
      run: sudo apt-get install -y imagemagick

    - name: Set App Name
      run: |
        sed -i "s|MY_APP_NAME|${{ github.event.inputs.app_name }}|g" template/app/src/main/res/values/strings.xml

    - name: Download Logo (Google favicon)
      run: |
        DOMAIN=$(echo "${{ github.event.inputs.url }}" | sed 's|https://||;s|http://||;s|/.*||')
        curl -L "https://www.google.com/s2/favicons?sz=512&domain=$DOMAIN" -o logo.png
        
    - name: Convert to WEBP
      run: |
        convert logo.png -resize 512x512 logo.webp

    - name: Clean Wrong Icons
      run: |
        rm -f template/app/src/main/res/mipmap-anydpi-v26/*.webp
        rm -f template/app/src/main/res/mipmap-anydpi-v26/*.png

    - name: Replace Icons (FINAL CLEAN)
      run: |
        for dir in template/app/src/main/res/mipmap-*; do
          if [[ "$dir" != *"anydpi"* ]]; then
            cp logo.webp $dir/ic_launcher.webp || true
            cp logo.webp $dir/ic_launcher_round.webp || true
          fi
        done

    - name: Replace URL
      run: |
        sed -i "s|MY_URL|${{ github.event.inputs.url }}|g" template/app/src/main/java/com/webviewtemplate/webviewtemplate/MainActivity.kt

    - name: Build APK
      run: |
        cd template
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: template/app/build/outputs/apk/debug/app-debug.apk

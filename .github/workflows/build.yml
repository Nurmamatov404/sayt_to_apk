name: Build APK

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Install Android SDK
      uses: android-actions/setup-android@v3

    - name: Replace URL
      run: |
        sed -i "s|MY_URL|${{ github.event.client_payload.url }}|g" template/app/src/main/java/com/example/app/MainActivity.java

    - name: Build APK
      run: |
        cd template
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: template/app/build/outputs/apk/debug/app-debug.apk
